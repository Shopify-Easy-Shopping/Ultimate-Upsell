<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="24" height="24" fill="none">
  <rect width="1200" height="1200" rx="0" fill="#d6ebe6"/>

  <!-- bar chart -->
  <polyline
    points="100,1100 100,900, 250,900 250,1100, 100,1100"
    stroke="#95bf47"
    stroke-width="40"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="#95bf47"
    opacity="1"
  />

  <polyline
    points="350,1100 350,800, 500,800 500,1100 350,1100"
    stroke="#95bf47"
    stroke-width="40"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="#95bf47"
    opacity="1"
  />

  <polyline
    points="650,1100 650,600, 800,600 800,1100 650,1100"
    stroke="#95bf47"
    stroke-width="40"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="#95bf47"
    opacity="1"
  />

  <polyline
    points="950,1100 950,100, 1100,100 1100,1100 950,1100"
    stroke="#95bf47"
    stroke-width="40"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="#95bf47"
    opacity="1"
  />

  <!-- Upsell arrow (pointing up-right, bold) -->
  <polyline
    points="100,700  700,100 800,200  200,800, 100,700"
    stroke="#5d6bc4"
    stroke-width="40"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="#5d6bc4"
    opacity="1"
  />
  <!-- Arrowhead at top-right -->
  <polyline
    points="400,100  800,100 800,500, 400,100"
    stroke="#5d6bc4"
    stroke-width="40"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="#5d6bc4"
    opacity="1"
  />


</svg>
